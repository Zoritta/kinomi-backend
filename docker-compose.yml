services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kinomi
      POSTGRES_PASSWORD: kinomi_dev_password
      POSTGRES_DB: kinomi
    ports:
      - '5433:5432'
    volumes:
      - kinomi_postgres_data:/var/lib/postgresql/data

volumes:
  kinomi_postgres_data:
